training:
  defense: fixed_mixed_at
  best_criterion: robust_val
  eval_every: 1
  robust_val:
    steps: 7
    subset_size: 512
  train_attack:
    name: pgd
    eps: 0.031372549
    alpha: 0.007843137
    steps: 7
    restarts: 1
    random_start: true
  eval:
    attacks: [pgd20, apgd_ce_50, apgd_dlr_50]
  apgd_every_n_batches: 5
  stages:
    - name: warmup_fgsm
      start_epoch: 0
      end_epoch: 24
      mix:
        clean: 0.5
        fgsm: 0.5
    - name: pgd_phase
      start_epoch: 25
      end_epoch: 59
      mix:
        clean: 0.3
        pgd: 0.7
    - name: apgd_calibration
      start_epoch: 60
      end_epoch: 79
      mix:
        clean: 0.3
        pgd: 0.5
        apgd_ce: 0.2
